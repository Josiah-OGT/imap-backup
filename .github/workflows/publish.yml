name: build-and-publish

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Skip rebuilds for changes that never end up in the image. Only Containerfile
    # and scripts/ are built in, so doc/config-only commits don't republish.
    # NOTE: this filter also applies to tag pushes — always cut release tags on a
    # commit that includes the code change (the normal case), or trigger manually.
    paths-ignore:
      - "README.md"          # NB: DOCKERHUB.md is NOT ignored — the publish job
      - "LICENSE"            # syncs it to the Docker Hub description, so changes
      - ".env.example"       # to it must trigger a run.
      - "docker-compose.yml"
      - "quadlet/**"
  workflow_dispatch:
  schedule:
    # Weekly rebuild (Mon 04:17 UTC) to pull the latest isync + Alpine patches.
    - cron: "17 4 * * 1"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write          # push to GHCR via the built-in GITHUB_TOKEN

jobs:
  build:
    runs-on: ubuntu-latest
    # Map secrets/vars into env so they can be referenced in `if:` conditions
    # (the `secrets` context is not allowed in step-level `if:`).
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
      # The Docker Hub description API rejects PATs (403) — it needs the account
      # password. Optional: set it to enable description sync; the step skips if unset.
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Read the isync version Alpine currently ships so we can tag images with it.
      - name: Detect isync version
        id: isync
        run: |
          ver=$(docker run --rm alpine:3.22 sh -c \
                'apk add -q isync >/dev/null 2>&1 && mbsync --version 2>&1 | head -n1' \
                | sed -E 's/^isync[[:space:]]+//')
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Detected isync $ver"

      # GHCR is always a target; Docker Hub is added only when its credentials +
      # image name are configured, so the job stays green before the secret exists.
      - name: Compute target images
        id: images
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          {
            echo 'list<<EOF'
            echo "ghcr.io/${repo_lc}"
            if [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_IMAGE" ]; then
              echo "docker.io/${DOCKERHUB_IMAGE}"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=isync-${{ steps.isync.outputs.version }},enable=${{ steps.isync.outputs.version != '' }}
          labels: |
            org.opencontainers.image.title=imap-backup
            org.opencontainers.image.description=Containerized mbsync IMAP backup & restore
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build a single-arch image into the runner first and scan it, so a
      # vulnerable image is never published. OS-package CVEs are identical
      # across arches, so amd64 is representative of the arm64 build too.
      # The multi-arch push below reuses these layers from the gha cache.
      - name: Build image for scanning (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: imap-backup:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
              --scanners vuln \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              --no-progress \
              imap-backup:scan

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sync the Docker Hub repo description from DOCKERHUB.md. Requires the
      # DOCKERHUB_PASSWORD secret (account password — the description API rejects
      # PATs); skips cleanly if unset. Only on main, and never fails the publish.
      - name: Update Docker Hub description
        if: env.DOCKERHUB_PASSWORD != '' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          short-description: "Containerized mbsync IMAP backup & restore — multi-arch, CVE-scanned"
          readme-filepath: ./DOCKERHUB.md
